name: Bug report
description: Reporte um comportamento incorreto sem incluir dados sensíveis.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Não inclua valores reais de cookies, tokens ou credenciais.
  - type: input
    id: version
    attributes:
      label: Versão ou commit
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Componente
      options: [Extensão, Rust, C, C++, Web Lab, Build, Documentação]
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Comportamento observado
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reprodução mínima com dados fictícios
    validations:
      required: true
